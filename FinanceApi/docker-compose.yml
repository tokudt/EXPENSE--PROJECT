version: "3.9"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: personal_finance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./personal_finance_db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=personal_finance;Username=postgres;Password=yourpassword"
      Jwt__Key: "CHANGE_ME_USE_A_256_BIT_RANDOM_SECRET_KEY_IN_PRODUCTION"
      Jwt__Issuer: "FinanceApi"
      Jwt__Audience: "FinanceApiUsers"
      Jwt__ExpiryHours: "24"
      ASPNETCORE_ENVIRONMENT: "Production"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
